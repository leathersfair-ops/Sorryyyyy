<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart BODMAS Calculator</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }

        .calculator {
            background-color: #333;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 320px;
        }

        #display {
            width: 100%;
            height: 60px;
            font-size: 1.5rem;
            text-align: right;
            margin-bottom: 20px;
            padding: 10px;
            box-sizing: border-box;
            border: none;
            border-radius: 10px;
            background: #222;
            color: #0ff;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 15px;
            font-size: 1.1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background-color: #444;
            color: white;
            transition: 0.2s;
        }

        button:hover { background-color: #555; }

        .op-btn { background-color: #f39c12; color: white; } /* Basic Math */
        .spec-btn { background-color: #3498db; color: white; } /* Sq/Cube */
        .eq-btn { background-color: #27ae60; grid-column: span 2; }
        .clear-btn { background-color: #e74c3c; grid-column: span 2; }

    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" placeholder="0" readonly>
    <div class="buttons">
        <button class="spec-btn" onclick="calc('sqrt')">√</button>
        <button class="spec-btn" onclick="calc('cbrt')">∛</button>
        <button class="spec-btn" onclick="calc('sq')">x²</button>
        <button class="spec-btn" onclick="calc('cu')">x³</button>

        <button onclick="append('(')">(</button>
        <button onclick="append(')')">)</button>
        <button class="op-btn" onclick="append('/')">/</button>
        <button class="op-btn" onclick="append('*')">×</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button class="op-btn" onclick="append('-')">-</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button class="op-btn" onclick="append('+')">+</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="append('.')">.</button>

        <button onclick="append('0')">0</button>
        <button class="clear-btn" onclick="clearDisplay()">AC</button>
        <button class="eq-btn" onclick="calculate()">=</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');

    function append(value) {
        display.value += value;
    }

    function clearDisplay() {
        display.value = '';
    }

    // Handles BODMAS naturally using JavaScript's engine
    function calculate() {
        try {
            // Evaluates the string following DMAS/BODMAS rules
            display.value = eval(display.value);
        } catch (error) {
            display.value = "Error";
            setTimeout(clearDisplay, 1500);
        }
    }

    // Advanced Scientific Functions
    function calc(type) {
        let val = parseFloat(display.value);
        if (isNaN(val)) return;

        switch(type) {
            case 'sqrt': display.value = Math.sqrt(val); break;
            case 'cbrt': display.value = Math.cbrt(val); break;
            case 'sq': display.value = Math.pow(val, 2); break;
            case 'cu': display.value = Math.pow(val, 3); break;
        }
    }
</script>

</body>
</html>
