<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Jaana</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #fff0f5;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        h1 {
            color: red;
            font-size: 3rem;
            margin-bottom: 50px;
        }

        .container {
            text-align: center;
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #yesBtn {
            background-color: #ff4d4d;
            color: white;
        }

        #noBtn {
            background-color: #808080;
            color: white;
            position: absolute; /* Needed for movement */
        }

        #flower-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
        }

        .flower {
            position: absolute;
            font-size: 2rem;
            animation: fall 3s linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>My dearest Jaana</h1>
        <div class="buttons">
            <button id="yesBtn">Will you be mine?</button>
            <button id="noBtn">Not now</button>
        </div>
    </div>

    <div id="flower-container"></div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const flowerContainer = document.getElementById('flower-container');

        // The "Fleeing" Logic
        noBtn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        });

        // The "Flower" Logic
        yesBtn.addEventListener('click', () => {
            flowerContainer.style.display = 'block';
            for (let i = 0; i < 50; i++) {
                createFlower();
            }
            yesBtn.innerHTML = "I knew it! ❤️";
        });

        function createFlower() {
            const flower = document.createElement('div');
            const flowers = ['🌸', '🌹', '🌷', '🌺', '🌼'];
            flower.classList.add('flower');
            flower.innerHTML = flowers[Math.floor(Math.random() * flowers.length)];
            flower.style.left = Math.random() * 100 + 'vw';
            flower.style.animationDuration = Math.random() * 2 + 3 + 's';
            flowerContainer.appendChild(flower);
        }
    </script>
</body>
</html>
