<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Moon</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f5e6be; /* Light Golden Background */
            font-family: 'Georgia', serif;
            overflow: hidden;
            text-align: center;
        }

        h1 {
            color: #5d4037; /* Light Brown Color */
            font-size: 2.5rem;
            font-weight: bold;
            padding: 20px;
            margin-bottom: 40px;
        }

        .btn-container {
            position: relative;
            width: 300px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: 0.1s;
        }

        /* The Hidden Yes Button */
        #yesBtn {
            background-color: #8d6e63;
            color: #f5e6be;
            position: absolute;
            z-index: 1;
        }

        /* The Moving No Box */
        #noBtn {
            background-color: #000000; /* Black Box */
            color: #a1887f; /* Brown Text */
            position: absolute;
            z-index: 2;
            white-space: nowrap;
        }

        #moon-shower {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
        }

        .moon {
            position: absolute;
            font-size: 2.5rem;
            animation: fall 4s linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0.5; }
        }
    </style>
</head>
<body>

    <h1>Will you be the moon of my Eid?</h1>

    <div class="btn-container">
        <button id="yesBtn">Yes</button>
        <button id="noBtn">no please</button>
    </div>

    <div id="moon-shower"></div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const moonShower = document.getElementById('moon-shower');

        // Function to move the "No" button
        const moveNo = () => {
            const padding = 50;
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - padding);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - padding);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        };

        // Triggers for moving
        noBtn.addEventListener('mouseover', moveNo);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveNo();
        });

        // Trigger for the Moon shower
        yesBtn.addEventListener('click', () => {
            moonShower.style.display = 'block';
            noBtn.style.display = 'none'; // Hide No forever
            yesBtn.innerHTML = "Eid Mubarak! 🌙";
            
            for (let i = 0; i < 80; i++) {
                setTimeout(createMoon, i * 100);
            }
        });

        function createMoon() {
            const moon = document.createElement('div');
            const icons = ['🌙', '⭐', '🌙', '✨']; // Mixture of moons and stars
            moon.classList.add('moon');
            moon.innerHTML = icons[Math.floor(Math.random() * icons.length)];
            moon.style.left = Math.random() * 100 + 'vw';
            moon.style.top = '-50px';
            moon.style.animationDuration = Math.random() * 2 + 3 + 's';
            moonShower.appendChild(moon);
            
            // Clean up to prevent lag
            setTimeout(() => { moon.remove(); }, 5000);
        }
    </script>
</body>
</html>
