<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khana Khaya?</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            /* Burger bun texture/color */
            background-color: #d99036; 
            background-image: radial-gradient(#e3a65a 15%, transparent 16%),
                              radial-gradient(#e3a65a 15%, transparent 16%);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            font-family: 'Coneria Script', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        h1 {
            color: #5d3a1a;
            font-size: 3.5rem;
            font-weight: bold;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px #fff;
            margin-bottom: 50px;
            padding: 0 20px;
        }

        .buttons {
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: center;
        }

        button {
            padding: 20px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            border: 4px solid #5d3a1a;
            cursor: pointer;
            z-index: 10;
        }

        #khatiBtn {
            background-color: #ffcc00; /* Mustard yellow */
            color: #5d3a1a;
        }

        #khaliaBtn {
            background-color: #ffffff;
            color: #5d3a1a;
            position: absolute; 
            transition: 0.1s;
        }

        #food-shower {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
        }

        .food-item {
            position: absolute;
            font-size: 3rem;
            animation: fall 3s linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <h1>KHANA KHAYA "NAHI KHAYA"</h1>

    <div class="buttons">
        <button id="khatiBtn">Khati hun</button>
        <button id="khaliaBtn">Khalia</button>
    </div>

    <div id="food-shower"></div>

    <script>
        const khaliaBtn = document.getElementById('khaliaBtn');
        const khatiBtn = document.getElementById('khatiBtn');
        const foodShower = document.getElementById('food-shower');

        // Logic for the button to run away
        const escape = () => {
            const x = Math.random() * (window.innerWidth - khaliaBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - khaliaBtn.offsetHeight);
            khaliaBtn.style.left = `${x}px`;
            khaliaBtn.style.top = `${y}px`;
        };

        khaliaBtn.addEventListener('mouseover', escape);
        khaliaBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            escape();
        });

        // Logic for the Food Shower
        khatiBtn.addEventListener('click', () => {
            foodShower.style.display = 'block';
            khaliaBtn.style.display = 'none'; // Hide the other button
            khatiBtn.innerHTML = "Chalien khaiyen phir! 🫡";
            
            for (let i = 0; i < 100; i++) {
                setTimeout(createFood, i * 100);
            }
        });

        function createFood() {
            const item = document.createElement('div');
            const menu = ['🍔', '🍕', '🌭', '🍟', '🌮❤️', '🍩'];
            item.classList.add('food-item');
            item.innerHTML = menu[Math.floor(Math.random() * menu.length)];
            item.style.left = Math.random() * 100 + 'vw';
            item.style.top = '-50px';
            item.style.animationDuration = Math.random() * 2 + 2 + 's';
            foodShower.appendChild(item);
            
            // Remove from DOM after falling to keep it smooth
            setTimeout(() => { item.remove(); }, 4000);
        }
    </script>
</body>
</html>
